version: '3.8'

services:
  api:
    build: .
    ports:
      - "5002:3000"
    restart: always
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    restart: always
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=

  ngrok:
    image: ngrok/ngrok:latest
    command: "http frontend:5173"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      - frontend
