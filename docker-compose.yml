version: '3.8'

services:
  api:
    build: .
    ports:
      - "5002:3000"
    restart: always
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    restart: always
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=https://ms-presidio-analyzer.vizru-ras.com
